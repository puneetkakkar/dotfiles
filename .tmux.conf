# use C-a, since it's on the home row and easier to hit than C-b
set-option -g prefix C-a
unbind-key C-a
bind-key C-a send-prefix
set -g base-index 1

# Easy config reload
bind-key R source-file ~/.tmux.conf \; display-message "tmux.conf reloaded."

# vi is good
setw -g mode-keys vi

# mouse behavior
set -g mouse on

set-option -g default-terminal "tmux-256color"
set-option -ga terminal-overrides ",xterm-256color:RGB,xterm-ghostty:RGB,*:RGB"
set-option -sg escape-time 10
set-option -g focus-events on

# set history limit
set-option -g history-limit 100000

bind-key : command-prompt
bind-key r refresh-client
bind-key L clear-history

bind-key space next-window
bind-key bspace previous-window
bind-key enter next-layout

# use vim-like keys for splits and windows
bind-key '\' split-window -h -c "#{pane_current_path}"
bind-key - split-window -v -c "#{pane_current_path}"
bind-key h select-pane -L
bind-key j select-pane -D
bind-key k select-pane -U
bind-key l select-pane -R

# uncomment below stanza to enable smart pane switching with awareness of vim splits
# bind -n C-h run "(tmux display-message -p '#{pane_current_command}' | grep -iqE '(^|\/)vim$' && tmux send-keys C-h) || tmux select-pane -L"
# bind -n C-j run "(tmux display-message -p '#{pane_current_command}' | grep -iqE '(^|\/)vim$' && tmux send-keys C-j) || tmux select-pane -D"
# bind -n C-k run "(tmux display-message -p '#{pane_current_command}' | grep -iqE '(^|\/)vim$' && tmux send-keys C-k) || tmux select-pane -U"
# bind -n C-l run "(tmux display-message -p '#{pane_current_command}' | grep -iqE '(^|\/)vim$' && tmux send-keys C-l) || tmux select-pane -R"
# bind -n C-\ run "(tmux display-message -p '#{pane_current_command}' | grep -iqE '(^|\/)vim$' && tmux send-keys 'C-\\') || tmux select-pane -l"
# bind C-l send-keys 'C-l'

bind-key C-o rotate-window

bind-key + select-layout main-horizontal
bind-key = select-layout main-vertical
set-window-option -g other-pane-height 25
set-window-option -g other-pane-width 80

bind-key a last-pane
bind-key q display-panes
bind-key c new-window
bind-key t next-window
bind-key T previous-window

bind-key [ copy-mode
bind-key ] paste-buffer

# Claude-agent quick-spawn (prefix A) — fzf picker over existing branches,
# or type a new label. Two-step: launcher pops up the picker, then runs
# claude-agent outside the popup so switch-client targets the right client.
bind-key A run-shell "$HOME/.local/bin/claude-agent-launcher '#{pane_current_path}'"

# prefix N: jump to the next window (across sessions) that has
# `@claude-needs-input` set — the same flag the status-right ● dot reads. Use
# when the dot appears and you don't want to hunt through sessions/windows.
# Silently displays a message if nothing's waiting.
#
# `##{...}` escapes the format so tmux passes the literal `#{...}` through
# to the shell. Without the escape, tmux pre-substitutes the format against
# the CURRENT pane at keypress time — collapsing the list-windows `-F` arg to
# the empty string when the current pane's @claude-needs-input is unset, and
# silently returning "no waiting" even when other windows have the flag.
bind-key N run-shell 'target=$(tmux list-windows -a -F "##{?@claude-needs-input,##{session_name}:##{window_index},}" | grep -v "^$" | head -1); if [ -n "$target" ]; then tmux switch-client -t "$target"; else tmux display-message "No Claude windows waiting"; fi'

# Popup shell — quick `gh pr list`, `git status`, etc. without leaving the agent pane
bind-key G display-popup -E -w 85% -h 75% -d "#{pane_current_path}"
# prefix F: focus on THIS branch — its PR (title/state/mergeability), CI
# checks status, and local git status. Use when you want "is my thing ready
# to merge?" answered in one keystroke. Output piped through `less -R` so
# you can scroll long PR bodies / many CI checks (j/k, d/u, g/G, /search, q).
# GH_FORCE_TTY=$(tput cols) keeps gh's color output through the pipe AND
# tells gh's table renderer the real popup width — with a bare =1, gh can't
# probe the piped stdout for size and collapses every column to ~6 chars,
# so rows render empty. GH_PAGER=cat disables gh's internal pager so we
# don't get less-inside-less.
bind-key F display-popup -E -w 90% -h 80% -d "#{pane_current_path}" "export GH_FORCE_TTY=\$(tput cols) GH_PAGER=cat; { gh pr view 2>/dev/null || echo 'No PR for the current branch yet.'; echo; gh pr checks 2>/dev/null; echo; git -C \"#{pane_current_path}\" status -sb 2>/dev/null; } | less -R --mouse"

# prefix P: repo-wide PR overview — every open PR in this repo. Use when you
# want morning orientation, to coordinate reviews, or to check what landed
# upstream before rebasing.
bind-key P display-popup -E -w 90% -h 80% -d "#{pane_current_path}" "GH_FORCE_TTY=\$(tput cols) GH_PAGER=cat gh pr list 2>/dev/null | less -R --mouse"

# prefix B: open the current branch's PR in the browser. Pair with prefix F
# (in-terminal PR detail) — F when reading, B when interacting with reviewer
# threads / GitHub UI diff view.
bind-key B run-shell "cd '#{pane_current_path}' && gh pr view --web 2>/dev/null || tmux display-message 'No PR for current branch'"

# prefix W: parallel-worktree overview popup — every active worktree in this
# repo with its branch, dirty state, PR number/state, and whether Claude is
# waiting. Use when juggling 3+ slice branches to see "what needs me right
# now" without hunting through windows.
bind-key W display-popup -E -w 90% -h 80% -d "#{pane_current_path}" "$HOME/.local/bin/claude-worktree-status | less -R --mouse"

# tmux-thumbs — hint-based copy. prefix y captures the current pane, overlays
# letter hints on every URL/path/SHA/UUID/IP/number, you type the hint, the
# token lands in the macOS clipboard. Mirrors copy-mode `y` (yank) by design.
bind-key y run-shell "$HOME/.local/bin/tmux-thumbs-pick #{pane_id}"

# Session picker (overrides default `prefix s` with zoomed tree view)
bind-key s choose-tree -Zs

# Kill current session without killing the client. Switches to the last-active
# session first (cd-style), then kills the original. If this is the only
# session, switch-client -l no-ops, the kill detaches the client, and Ghostty
# closes — tmux.start.sh will boot a fresh `main` next time.
bind-key X confirm-before -p "Kill session #S? (y/n) " \
  "run-shell 'tmux switch-client -l 2>/dev/null; tmux kill-session -t \"#S\"'"

# Resurrect bindings (default: prefix C-s save, prefix C-r restore — explicit for clarity)

run-shell "tmux setenv -g TMUX_VERSION $(tmux -V | cut -c 6-)"

# Setup 'v' to begin selection as in Vim
# Update default binding of `Enter` to also use copy-pipe
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "reattach-to-user-namespace pbcopy"
unbind -T copy-mode-vi Enter
bind-key -T copy-mode-vi Enter send-keys -X copy-pipe-and-cancel "reattach-to-user-namespace pbcopy"

set-window-option -g display-panes-time 1500

# Status Bar
set-option -g status-interval 5
set-option -g status-style bg=black,fg=default
set-option -g pane-active-border-style fg=magenta
set-option -g pane-border-style fg=brightblack

# Left: session name, prominent (so you know which repo you're in)
set-option -g status-left-length 30
set-option -g status-left '#[fg=green,bold] #S #[fg=brightblack]│ '

# Right side: see the second `status-right` set after the theme is sourced
# (further down) — that one wins because it must run *after* the theme to
# preserve the literal `#{S:…}` cross-session indicator. Length stays here.
set-option -g status-right-length 80

# Window-status formats are overridden after the theme is sourced (see below)
# so the theme's color scheme is preserved while injecting the @claude-needs-input
# index swap.
set-option -g window-status-activity-style fg=yellow,bg=default
set-option -g window-status-bell-style fg=red,bg=default,bold

# Auto-rename ad-hoc windows from current command; respects manual names from claude-agent
set-window-option -g automatic-rename on
set-window-option -g automatic-rename-format '#{b:pane_current_path}'

# Renumber windows so killing window 2 of [1,2,3] leaves [1,2] not [1,3]
set-option -g renumber-windows on

# Solarized-light fallback
if-shell "[ \"$COLORFGBG\" = \"11;15\" ]" "set-option -g status-style bg=white"

# Set window notifications
setw -g monitor-activity on
set -g visual-activity on

# Auto-clear @claude-needs-input on any navigation event — covers within-
# session window switches, pane selects, and cross-session switch-client.
# (tmux doesn't have a "pane-focus-in" hook; this trio is the equivalent.)
# The dot's job is to alert you to a window you're not on; once you arrive,
# the flag is no longer needed regardless of whether Claude's hook fired.
set-hook -g after-select-window  'set-option -wqu @claude-needs-input'
set-hook -g after-select-pane    'set-option -wqu @claude-needs-input'
set-hook -g client-session-changed 'set-option -wqu @claude-needs-input'

# macOS clipboard works natively on tmux >= 2.6 — no reattach-to-user-namespace needed
set-option -g default-command "${SHELL}"

# Allow the arrow key to be used immediately after changing windows
set-option -g repeat-time 0

# Fix to allow mousewheel/trackpad scrolling in tmux 2.1
bind-key -T root WheelUpPane if-shell -F -t = "#{alternate_on}" "send-keys -M" "select-pane -t =; copy-mode -e; send-keys -M"
bind-key -T root WheelDownPane if-shell -F -t = "#{alternate_on}" "send-keys -M" "select-pane -t =; send-keys -M"

# Disable assume-paste-time, so that iTerm2's "Send Hex Codes" feature works
# with tmux 2.1. This is backwards-compatible with earlier versions of tmux,
# AFAICT.
set-option -g assume-paste-time 0

# Inject padding in new panes by setting a prefixed shell prompt
# set-option -g default-command 'bash --rcfile <(echo "PS1=\"    \$PS1\"; exec bash")'

# tpm plugin
set -g @plugin 'tmux-plugins/tpm'

# list of tmux plugins
set -g @plugin 'tmux-plugins/tmux-resurrect' # persist tmux sessions after computer restart
set -g @plugin 'tmux-plugins/tmux-continuum' # automatically saves sessions for you every 15 minutes

set -g @resurrect-capture-pane-contents 'on'
set -g @continuum-restore 'on'

# Disable activity alerts while restoring sessions and help prevent reseting the status bar styling
set -g visual-activity off
setw -g monitor-activity off

source-file ~/.config/tmux/tmux.theme

# Force-propagate window-status-format from the theme's @themepack variable.
# The theme uses `set -goq` which is set-once; without this re-set, edits to
# the theme variables don't propagate through to the actual format on reload.
set -gwF window-status-format "#{@themepack-window-status-format}"
set -gwF window-status-current-format "#{@theme-window-status-current-format}"

# Cross-session "Claude needs you" indicator (status-right prefix).
# Set after the theme so the literal #{S:...} survives — the theme's `-F`
# would otherwise evaluate the format at set-time and freeze the snapshot.
# Iterates every session; if any window has @claude-needs-input set, emits
# `● <session_name>`. Empty when nothing's pending.
set -g status-right '#[fg=#ffd866,bg=#000000]#{S:#{?#{!=:#{W:#{?@claude-needs-input,1,}},},● #{session_name} ,}}#[fg=#1a1e38,bg=#000000]#[fg=#ffffff,bg=#1a1e38] %H:%M:%S #[fg=#000000,bg=#1a1e38]#[fg=#ffffff,bg=#000000] %d-%b-%y'

# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run '~/.tmux/plugins/tpm/tpm'
